apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: stream-idle-timeout
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: stream-idle-timeout
  namespace: default
spec:
  gatewayClassName: stream-idle-timeout
  listeners:
    - name: http
      protocol: HTTP
      port: 80
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: stream-idle-timeout
---
apiVersion: aigateway.envoyproxy.io/v1beta1
kind: AIGatewayRoute
metadata:
  name: stream-idle-timeout
  namespace: default
spec:
  parentRefs:
    - name: stream-idle-timeout
      kind: Gateway
      group: gateway.networking.k8s.io
  rules:
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: stream-idle-timeout-silent-demo
      # Overall response deadline.
      timeouts:
        request: 30s
      # Deadline between bytes
      streamIdleTimeout: 5s
      backendRefs:
        - name: stream-idle-timeout-silent # Priority 0: never sends a first byte.
          priority: 0
        - name: stream-idle-timeout-healthy # Priority 1: streams an SSE response.
          priority: 1
    - matches:
        - headers:
            - type: Exact
              name: x-ai-eg-model
              value: stream-idle-timeout-semi-silent-demo
      # Overall response deadline.
      timeouts:
        request: 30s
      # Deadline between bytes
      streamIdleTimeout: 5s
      backendRefs:
        - name: stream-idle-timeout-semi-silent # Priority 0: sends a first byte, then goes silent.
          priority: 0
        - name: stream-idle-timeout-healthy # Priority 1: streams an SSE response.
          priority: 1
---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: stream-idle-timeout
  namespace: default
spec:
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        container:
          resources: {}
---
# Attaches a retry policy to the HTTPRoute generated by the AIGatewayRoute,
# so the upstream stream reset is retried to the backend in the rule.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: stream-idle-timeout
  namespace: default
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: stream-idle-timeout
  retry:
    numAttemptsPerPriority: 1
    numRetries: 2
    perRetry:
      backOff:
        baseInterval: 100ms
        maxInterval: 1s
    retryOn:
      triggers:
        # `reset` covers the case where the stream is reset by Envoy
        - reset
        - connect-failure
        - retriable-status-codes
      httpStatusCodes:
        - 502
        - 503
        - 504
